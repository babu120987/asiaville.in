<script type="text/javascript">
    function kalyanjewellers_infoblock(video,description,stats) {
    const infoBlock = document.createElement('div');
    infoBlock.classList.add('info-block');

    const rowDiv = document.createElement('div');
    rowDiv.classList.add('row', 'col-12', 'm-0');

    const videoCol = document.createElement('div');
    videoCol.classList.add('col-xl-9', 'col-md-12', 'col-lg-12', 'col-sm-12', 'col-xs-12');

    const videoElement = document.createElement('video');
    videoElement.setAttribute('controls', '');
    videoElement.setAttribute('width', '100%');
    videoElement.setAttribute('height', 'auto');
    videoElement.setAttribute('controlslist', 'nodownload');
    videoElement.setAttribute('poster', video.poster);

    const sourceElement = document.createElement('source');
    sourceElement.setAttribute('src', video.source.src);
    sourceElement.setAttribute('type',  video.source.type);

    videoElement.appendChild(sourceElement);
    videoCol.appendChild(videoElement);

    const paragraphElement = document.createElement('p');
    paragraphElement.classList.add('fw-900', 'text-center');
    paragraphElement.textContent = description;
    videoCol.appendChild(paragraphElement);

    const videoInfoCol = document.createElement('div');
    videoInfoCol.classList.add('col-xl-3', 'col-md-12', 'col-lg-12', 'col-sm-12', 'col-xs-12', 'm-auto', 'videoinfo');

    const resultsParagraph = document.createElement('p');
    resultsParagraph.classList.add('text-center');
    resultsParagraph.textContent = "Results";
    videoInfoCol.appendChild(resultsParagraph);

    const resultsRow = document.createElement('div');
    resultsRow.classList.add('row', 'm-0');

    
    console.log(stats);
    stats.forEach(result => {
        const cardDiv = document.createElement('div');
       
        
        if (Array.isArray(result.color)){
            cardDiv.classList.add('col-xl-12', 'col-md-4', 'col-lg-4', 'col-sm-4', 'col-xs-12', result.color, 'text-center');
            result.color.forEach(item => {
                cardDiv.classList.add(item);
            });

        }else{
            cardDiv.classList.add('col-xl-12', 'col-md-4', 'col-lg-4', 'col-sm-4', 'col-xs-12', result.color, 'text-center');
        }
        const countBlock = document.createElement('div');
        countBlock.classList.add('count-block');
        const countParagraph = document.createElement('p');
        countParagraph.textContent = result.count;
        countBlock.appendChild(countParagraph);

        const countType = document.createElement('div');
        countType.classList.add('count-type');
        const typeParagraph = document.createElement('p');
        typeParagraph.textContent = result.type;
        countType.appendChild(typeParagraph);

        cardDiv.appendChild(countBlock);
        cardDiv.appendChild(countType);
        resultsRow.appendChild(cardDiv);
    });

    videoInfoCol.appendChild(resultsRow);

    rowDiv.appendChild(videoCol);
    rowDiv.appendChild(videoInfoCol);

    infoBlock.appendChild(rowDiv);

    return infoBlock;
}



    function tatachakragold_infoblock(video,images) {
    const infoBlock = document.createElement('div');
    infoBlock.classList.add('info-block');

    const rowDiv = document.createElement('div');
    rowDiv.classList.add('row', 'col-12', 'm-0');

    const videoCol = document.createElement('div');
    videoCol.classList.add('col-xl-7', 'col-md-7', 'col-lg-7', 'col-sm-12', 'col-xs-12');

    const videoElement = document.createElement('video');
    videoElement.setAttribute('controls', '');
    videoElement.setAttribute('width', '100%');
    videoElement.setAttribute('height', 'auto');
    videoElement.setAttribute('controlslist', 'nodownload');
    videoElement.setAttribute('poster', video.poster);

    const sourceElement = document.createElement('source');
    sourceElement.setAttribute('src', video.source.src);
    sourceElement.setAttribute('type', video.source.type);

    videoElement.appendChild(sourceElement);
    videoCol.appendChild(videoElement);

    const imgCol = document.createElement('div');
    imgCol.classList.add('col-xl-5', 'col-md-5', 'col-lg-5', 'col-sm-12', 'col-xs-12', 'm-auto');

    const imgRow1 = document.createElement('div');
    imgRow1.classList.add('row', 'col-12', 'm-0');

    const imgRow2 = document.createElement('div');
    imgRow2.classList.add('row', 'col-12', 'm-0');

    images.slice(0, 2).forEach(image => {
        const imgDiv = document.createElement('div');
        imgDiv.className = image.class;

        const imgElement = document.createElement('img');
        imgElement.classList.add('img-responsive', 'fade-in');
        imgElement.setAttribute('src', image.src);

        imgDiv.appendChild(imgElement);
        imgRow1.appendChild(imgDiv);
    });

    images.slice(2).forEach(image => {
        const imgDiv = document.createElement('div');
        imgDiv.className = image.class;

        const imgElement = document.createElement('img');
        imgElement.classList.add('img-responsive', 'fade-in');
        imgElement.setAttribute('src', image.src);

        imgDiv.appendChild(imgElement);
        imgRow2.appendChild(imgDiv);
    });

    imgCol.appendChild(imgRow1);
    imgCol.appendChild(imgRow2);

    rowDiv.appendChild(videoCol);
    rowDiv.appendChild(imgCol);

    infoBlock.appendChild(rowDiv);

    return infoBlock;
}
    function tatatea_infoblock(images) {
    const rowDiv = document.createElement('div');
    rowDiv.classList.add('row', 'col-xl-12', 'col-md-12', 'col-lg-12', 'col-sm-12', 'col-xs-12', 'info-block');


    images.forEach(src => {
        const imgCol = document.createElement('div');
        imgCol.classList.add('col-xl-4', 'col-md-4', 'col-lg-4', 'col-sm-6', 'col-xs-12', 'text-center');

        const imgElement = document.createElement('img');
        imgElement.classList.add('img-responsive');
        imgElement.setAttribute('src', src);

        imgCol.appendChild(imgElement);
        rowDiv.appendChild(imgCol);
    });

   return rowDiv;
}
function spc_infoblock(video,image1,image2) {
    const infoBlock = document.createElement('div');

    function ziva_imageblock(image) {
    const infoBlock = document.createElement('div');
    infoBlock.classList.add('info-block');

    const rowDiv = document.createElement('div');
    rowDiv.classList.add('row', 'col-xl-12', 'col-md-12', 'col-lg-12', 'col-sm-12', 'col-xs-12');

    const imgElement = document.createElement('img');
    imgElement.classList.add('img-responsive');
    imgElement.setAttribute('src', image);

    rowDiv.appendChild(imgElement);

    infoBlock.appendChild(rowDiv);

   return infoBlock;
}
function spotify_imageblock(images) {
    const infoBlock = document.createElement('div');
    infoBlock.classList.add('row', 'col-12', 'info-block');
    images.forEach(image => {
        const colDiv = document.createElement('div');
        colDiv.classList.add('col-6', 'col-xl-3', 'col-md-3', 'col-lg-3', 'col-sm-6', 'col-xs-6');
        const imgElement = document.createElement('img');
        imgElement.classList.add('img-responsive');
        imgElement.setAttribute('src', image);
        colDiv.appendChild(imgElement);
        infoBlock.appendChild(colDiv);
    });
   return infoBlock;
}
function createBrandBlock(brands) {
   
    const brandBlock = document.createElement('div');
    brandBlock.classList.add('row', 'brand-block');
    brands.forEach(brand => {
        const colDiv = document.createElement('div');
        colDiv.classList.add('col-2', 'img-item');

        const imgWrapper = document.createElement('div');

        const imgElement = document.createElement('img');
        imgElement.classList.add('my-img-thumbnail');
        imgElement.setAttribute('src', brand.image);
        imgElement.setAttribute('alt', brand.name);

        imgWrapper.appendChild(imgElement);
        colDiv.appendChild(imgWrapper);

        brandBlock.appendChild(colDiv);
    });
    
    return brandBlock;
}
