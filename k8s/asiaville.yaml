apiVersion: apps/v1
kind: Deployment
metadata:
  name: asiaville
spec:
  replicas: 5
  selector:
    matchLabels:
      app: asiaville
  template:
    metadata:
      labels:
        app: asiaville
    spec:
      containers:
      - name: asiaville
        image: asiaville.in:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: asiaville-service
spec:
  type: NodePort
  selector:
    app: asiaville
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
