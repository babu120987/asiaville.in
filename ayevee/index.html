    function createElement(tag, attributes = {}, content = '') {
  const element = document.createElement(tag);
  for (const key in attributes) {
    element.setAttribute(key, attributes[key]);
  }
  element.innerHTML = content;
  return element;
}
function createMainSection(ele,data) {
  const leftDiv = createElement('div', { class: 'left col-flex' });

  const topDiv = createElement('div', { class: 'top' });
  const topImg = createElement('img', {
    src: data.left.top.imgSrc,
    width: data.left.top.imgWidth,
    height: data.left.top.imgHeight,
    alt: ''
  });
  const taglineP = createElement('p', { class: 'tagline-txt' }, data.left.top.tagline);
  const introP = createElement('p', { class: 'intro-txt' }, data.left.top.intro);
  const introP2 = createElement('p', { class: 'intro2-txt' }, data.left.top.intro2);

  topDiv.appendChild(topImg);
  topDiv.appendChild(taglineP);
  topDiv.appendChild(introP);
  topDiv.appendChild(introP2);

  const bottomDiv = createElement('div', { class: 'bottom col-flex gap-5' });

  const appDownloadBlock = createElement('div', { class: 'app-download-link-block' });
  const availableP = createElement('p', {}, data.left.bottom.appDownloadLinks.text);
  const appLinksDiv = createElement('div', { class: 'row-flex gap-0-5 jc-s ai-c' });

  data.left.bottom.appDownloadLinks.links.forEach(link => {
    const appLink = createElement('a', {
      href: link.href,
      target: '_blank'
    }, createElement('img', {
      src: link.imgSrc,
      width: link.imgWidth,
      height: link.imgHeight,
      alt: ''
    }).outerHTML);
    appLinksDiv.appendChild(appLink);
  });

  appDownloadBlock.appendChild(availableP);
  appDownloadBlock.appendChild(appLinksDiv);

  const sponsorsBlock = createElement('div', { class: 'sponsors-block' });
  const sponsorsTitleP = createElement('p', { class: 'title-sponsors' }, data.left.bottom.sponsors.title);
  const sponsorsDiv = createElement('div', { class: 'row-flex gap-0-5 jc-s ai-c' });

  data.left.bottom.sponsors.sponsorsList.forEach(sponsor => {
    const sponsorLink = createElement('a', {
      href: sponsor.href,
      target: '_blank'
    }, createElement('img', {
      src: sponsor.imgSrc,
      width: sponsor.imgWidth,
      height: sponsor.imgHeight,
      alt: ''
    }).outerHTML);
    sponsorsDiv.appendChild(sponsorLink);
  });

  sponsorsBlock.appendChild(sponsorsTitleP);
  sponsorsBlock.appendChild(sponsorsDiv);

  bottomDiv.appendChild(appDownloadBlock);
  bottomDiv.appendChild(sponsorsBlock);

  leftDiv.appendChild(topDiv);
  leftDiv.appendChild(bottomDiv);

  // Create the right column div
  const rightDiv = createElement('div', { class: 'right' });
  const rightImg = createElement('img', {
    src: data.right.imgSrc,
    width: data.right.imgWidth,
    height: data.right.imgHeight,
    alt: ''
  });

  rightDiv.appendChild(rightImg);

  // Create a container to hold both left and right columns
  
  ele.querySelector('.content').append(leftDiv);
  ele.querySelector('.content').append(rightDiv);
}

function createItem(itemData) {
  const itemDiv = createElement('div', { class: 'item' });

  const img = createElement('img', {
    src: itemData.imgSrc,
    alt: itemData.imgAlt,
    width: itemData.imgWidth,
    height: itemData.imgHeight
  });

  const contentDiv = createElement('div', { class: 'content' });

  const headingBlockDiv = createElement('div', { class: 'heading-block mb-1-5' });
  const headingImg = createElement('img', {
    src: itemData.content.headingBlock.imgSrc,
    alt: itemData.content.headingBlock.imgAlt,
    width: itemData.content.headingBlock.imgWidth,
    height: itemData.content.headingBlock.imgHeight
  });
  const titleP = createElement('p', { class: 'title' }, itemData.content.headingBlock.title);
  const descP = createElement('p', {}, itemData.content.headingBlock.description);
  headingBlockDiv.appendChild(headingImg);
  headingBlockDiv.appendChild(titleP);
  headingBlockDiv.appendChild(descP);

  const paragraphP = createElement('p', { class: 'mb-1-5' }, itemData.content.paragraph);

  const footerBlockDiv = createElement('div', { class: 'footer-block' });
  const ratingDiv = createElement('div', {
    class: `rating ${itemData.content.footerBlock.ratingClass}`
  }, itemData.content.footerBlock.rating);
  footerBlockDiv.appendChild(ratingDiv);

  contentDiv.appendChild(headingBlockDiv);
  contentDiv.appendChild(paragraphP);
  contentDiv.appendChild(footerBlockDiv);
  itemDiv.appendChild(img);
  itemDiv.appendChild(contentDiv);

  return itemDiv;
}


function create_iframevideo(data){
    const iframe = document.createElement("iframe");
    iframe.width = data.width;
    iframe.height = data.height;
    iframe.style.maxWidth = data.style.maxWidth;
    iframe.style.height = data.style.height;
    iframe.style.aspectRatio = data.style.aspectRatio;
    iframe.src = data.src;
    iframe.title = data.title;
    iframe.frameBorder = data.frameBorder;
    iframe.allow =data.allow;
    iframe.referrerPolicy = data.referrerPolicy;
    iframe.allowFullscreen = data.allowFullscreen;
    return iframe
}
    function feature_textarea(ele,data,type){
        var h3 = document.createElement("h3");
        h3.innerHTML = data.title;
        if(type=="right"){
            h3.classList.add("ta-r");
        }
        ele.append(h3)
        var p = document.createElement("p");
        p.innerHTML = data.description;
        if(type=="right"){
            p.classList.add("ta-r");
        }
        ele.append(p)
        return ele
    }

    function feature_imgarea(ele,data){
        var img = document.createElement("img");
        img.src = data.url;
        img.alt = data.alt;
        img.width = data.width;
        img.height = data.height;
        ele.append(img)
        return ele
    }
    function create_feature_item(item){
        var featureItem = document.createElement("div");
        featureItem.classList.add("row-flex", "gap-5", "ai-c", "m-col-flex", "feature-item");
        if(item.class!=""){
            featureItem.classList.add(item.class)
        }
        

        var leftDiv = document.createElement("div");
        leftDiv.classList.add("left");
        if(item.left.class!=""){
            leftDiv.classList.add(item.left.class)
        }
        if(item.left.type=="text"){
            leftDiv = feature_textarea(leftDiv,item.left,'left')
        }else{
            leftDiv = feature_imgarea(leftDiv,item.left.image)
        }


        var rightDiv = document.createElement("div");
        rightDiv.classList.add("right");
        if(item.right.class!=""){
            item.right.class.forEach(className=>{
                rightDiv.classList.add(className)
            });
        }
        rightDiv.classList.add("right");
        if(item.right.type=="text"){
            rightDiv = feature_textarea(rightDiv,item.right,'right')
        }else{
            rightDiv = feature_imgarea(rightDiv,item.right.image)
        }

        featureItem.appendChild(leftDiv);
        featureItem.appendChild(rightDiv);
        return featureItem
    }
function createReviewItem(item) {
    const divItem = document.createElement('div');
    divItem.className = 'item';

    const divColFlex = document.createElement('div');
    divColFlex.className = 'col-flex';

    const pName = document.createElement('p');
    pName.className = 'name';
    pName.textContent = item.name;

    const pReview = document.createElement('p');
    pReview.innerHTML = item.review.replace(/\n/g, '<br/>');

    const divRate = document.createElement('div');
    divRate.className = 'row-flex jc-c rate';

    const imgReview = document.createElement('img');
    imgReview.src = item.imageUrl;
    imgReview.width = item.imageWidth;
    imgReview.height = item.imageHeight;
    imgReview.alt = item.imageAlt;

    divRate.appendChild(imgReview);

    const divprofile = document.createElement('div');
    divprofile.className = 'row-flex jc-c ';
    
    const profileimg = document.createElement('img');
    profileimg.className = 'profile-pic';
    profileimg.src = item.profileimg_Url;
    profileimg.width = item.profileimg_Width;
    profileimg.height = item.profileimg_Height;
    profileimg.alt = item.profileimg_Alt;
    divprofile.appendChild(profileimg);

    divColFlex.appendChild(divprofile);
    divColFlex.appendChild(pName);
    divColFlex.appendChild(pReview);
    divColFlex.appendChild(divRate);
    divItem.appendChild(divColFlex);

    return divItem;
}
function createContactBlock(info) {
    const contactBlock = document.createElement('div');
    contactBlock.className = 'p-x-2';

    const contactInfo = document.createElement('p');
    contactInfo.innerHTML = `${info.name}<br><a href="mailto:${info.email}" target="_blank">${info.email}</a><br><a href="tel:${info.phone}" target="_blank">${info.phone}</a>`;

    contactBlock.appendChild(contactInfo);
    return contactBlock;
}
function createdownloa_btn(linkdata){
    const Link = document.createElement('a');
    Link.href = linkdata.url;
    Link.target = linkdata.target;

    const Img = document.createElement('img');
    Img.src = linkdata.image.url;
    Img.width = linkdata.image.width;
    Img.height = linkdata.image.height;
    Img.alt = linkdata.image.alt;

    Link.appendChild(Img);
    return Link
}
function section_titleimg(img){
    const imgElement = document.createElement("img");
    imgElement.src = img.url;
    imgElement.alt = img.alt;
    imgElement.width = img.width;
    imgElement.height = img.height;

    return imgElement;
}
document.addEventListener('DOMContentLoaded', () => {
    fetch('ayeveedata.json')
        .then(response => response.json())
        .then(data => {
            var banner = data.banner;
            var ourshows = data.ourshows;
            var aige = data.aige;
            var aigefeature = data.aigefeature;
            var review = data.reviews;
            var footer = data.footer;

            var section_banner = document.getElementById("banner-ayevee");
            createMainSection(section_banner,banner);


            var section_ourshows = document.getElementById('ourshows');
            section_ourshows.querySelector('.jtitle-img').append(section_titleimg(ourshows.title_img));
            ourshows.lists.forEach(item => {
                section_ourshows.querySelector('#show-slider').append(createItem(item));
            });

            var section_aige = document.getElementById('aige');
            section_aige.querySelector('.jtitle-img').append(section_titleimg(aige.title_img));
            section_aige.querySelector('.jdescription').innerHTML = aige.description;
            section_aige.querySelector('.container').append(create_iframevideo(aige.iframe));

            var section_aigefeature = document.getElementById('aige-feature');
            section_aigefeature.querySelector('.jtitle-img').append(section_titleimg(aigefeature.title_img));
            aigefeature.lists.forEach(item => {
                section_aigefeature.querySelector('.feature-list').append(create_feature_item(item));
            });


            
            var section_review = document.getElementById('review');

            section_review.querySelector('.jtitle-img').append(section_titleimg(review.title_img));

            section_review.querySelector('.jdescription').innerHTML = review.description;
            review.items.forEach(item => {
                document.getElementById('review-slider').append(createReviewItem(item))  ;
            });
            




            var section_footer = document.getElementById("footer-section");
            section_footer.querySelector('.get-in-title').innerHTML = footer.title;
            const leftBlock = createContactBlock(footer.contactinfo.left);
            leftBlock.classList.add('left', 'ta-r', 'br-1');
            section_footer.querySelector('.get-in-touch-info').appendChild(leftBlock)
            const rightBlock = createContactBlock(footer.contactinfo.right);
            rightBlock.classList.add('right');
            section_footer.querySelector('.get-in-touch-info').appendChild(rightBlock)


            section_footer.querySelector('.download-info p').innerHTML=footer.downloadinfo.title;

            const appDownloadContainer = document.createElement('div');
            appDownloadContainer.className = 'app-download-link-block col-flex gap-0-5 ai-c';
            footer.downloadinfo.links.forEach(info => {
                appDownloadContainer.appendChild(createdownloa_btn(info));
            });

            section_footer.querySelector('.download-info').append(appDownloadContainer);



           
          
        

           





                var option = {
                loop:true,
                dots: false,
                nav:true,
                navText:['<img src="../assets/img/prev.png" alt="previous"/>','<img src="../assets/img/next.png" alt="next"/>'],
                 responsive:{
                    0:{
                        items:1,
                        margin:20,
                    },
                    600:{
                        items:1,
                        margin:20,
                    },
                    800:{
                        items:2,
                        margin:20,
                    },
                    1000:{
                        items:2,
                        margin:20,
                    }
                }
            };
            $('.show-slider').owlCarousel(option);
    
            
    
            
    
                
            if(vw <= 786){
                var review_option = {
                loop:true,
                dots: true,
                nav:false,
                autoplay:true,
                autoHeight: true,
                
                 responsive:{
                    0:{
                        items:1,
                        margin:20,
                    },
                    600:{
                        items:1,
                        margin:20,
                    },
                    800:{
                        items:1,
                        margin:20,
                    },
                    1000:{
                        items:1,
                        margin:20,
                    }
                }
            };
    
            $('.review-slider').owlCarousel(review_option);
            
            }else{
                
                var review_option = {
                items: 3,
                    loop: true,
                    margin: 10,
                    center: true,
                    autoplay: true,
                    autoplayTimeout: 3000,
                    autoHeight:true,
                    autoplayHoverPause: true,
                    responsive: {
                        0: {
                            items: 1
                        },
                        600: {
                            items: 1
                        },
                        1000: {
                            items: 1
                        }
                    }
            };
    
                var owl = $('.review-slider').owlCarousel(review_option);
    
                setEqualHeight();
                $(window).resize(function() {
                    setEqualHeight();
                });
    
              
    
                owl.on('changed.owl.carousel', function(event) {
                    var items = event.item.count;
                    var item = event.item.index;
    
                    $('.owl-item').removeClass('near');
    
                    var prevItem = item - 1 < 0 ? items - 1 : item - 1;
                    var nextItem = item + 1 >= items ? 0 : item + 1;
    
                    $('.owl-item').eq(prevItem).addClass('near');
                    $('.owl-item').eq(nextItem).addClass('near');
                });
    
                owl.trigger('changed.owl.carousel');
    
    
                
            }
    
    
    
            function setEqualHeight() {
                    var maxHeight = 0;
                    $('.review-slider .item').each(function() {
                        var itemHeight = $(this).outerHeight();
                        if (itemHeight > maxHeight) {
                            maxHeight = itemHeight;
                        }
                    });
                    $('.review-slider .item').css('height', maxHeight);
                }
    
   
      	

        })	
        .catch(error => console.error('Error fetching JSON:', error));
});


// additional render invoke
$(document).mousemove(function() {
    $('.show-slider').owlCarousel(option);
    $('.review-slider .item').css('height', maxHeight);
    var owl = $('.review-slider').owlCarousel(review_option);
});



	 </script>
